services:
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=radiocalico
      - POSTGRES_USER=radiocalico
      - POSTGRES_PASSWORD=radiocalico
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radiocalico"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: always

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://radiocalico:radiocalico@db:5432/radiocalico
    depends_on:
      db:
        condition: service_healthy
    restart: always

  nginx:
    build:
      context: .
      dockerfile: Dockerfile.nginx
    ports:
      - "80:80"
    depends_on:
      - api
    restart: always

volumes:
  db_data:
